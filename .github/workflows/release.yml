name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-release:
    name: Package Release Artifacts
    runs-on: macos-15
    env:
      APP_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APP }}
      NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Swift toolchain
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build release artifacts
        run: |
          if [[ -n "${APP_IDENTITY}" && -n "${NOTARY_KEY_ID}" && -n "${NOTARY_ISSUER_ID}" && -n "${NOTARY_KEY_BASE64}" ]]; then
            SIGNING_MODE=developer-id NOTARIZE_APP=1 ARCHES="arm64 x86_64" make dist
          else
            make dist
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: THOR-release-${{ github.sha }}
          path: dist/*
          retention-days: 14

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
