name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-release:
    name: Package Release Artifacts
    runs-on: macos-15
    env:
      APP_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APP }}
      NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Swift toolchain
        run: |
          DEVELOPER_DIR="$(xcode-select -p)"
          echo "Using Xcode developer dir: ${DEVELOPER_DIR}"
          sudo xcode-select -s "$DEVELOPER_DIR"
          xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: Scripts/dev/swiftw package resolve

      - name: Run release smoke tests
        run: make test-unit

      - name: Smoke local tap install
        run: make tap-smoke

      - name: Require Apple signing for tagged releases
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [[ -z "${APP_IDENTITY}" || -z "${NOTARY_KEY_ID}" || -z "${NOTARY_ISSUER_ID}" || -z "${NOTARY_KEY_BASE64}" ]]; then
            echo "Tagged releases require Apple signing and notarization secrets."
            echo "Use workflow_dispatch for ad-hoc contributor smoke artifacts."
            exit 1
          fi

      - name: Build release artifacts
        run: |
          if [[ -n "${APP_IDENTITY}" && -n "${NOTARY_KEY_ID}" && -n "${NOTARY_ISSUER_ID}" && -n "${NOTARY_KEY_BASE64}" ]]; then
            SIGNING_MODE=developer-id NOTARIZE_APP=1 ARCHES="arm64 x86_64" make dist
          else
            echo "Building ad-hoc contributor smoke artifacts (workflow_dispatch only)."
            make dist
          fi

      - name: Summarize release outputs
        run: |
          ls -lh dist
          shasum -a 256 dist/*

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: THOR-release-${{ github.sha }}
          path: dist/*
          retention-days: 14

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
